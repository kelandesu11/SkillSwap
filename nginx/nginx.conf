events {}

http {
    upstream identity_service {
        server identity-profile-service:8000;
    }

    upstream session_service {
        server session-service:8000;
    }

    upstream notification_service {
        server notification-service:8000;
    }

    server {
        listen 80;

        location /api/v1/auth/ {
            proxy_pass http://identity_service;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/mfa/ {
            proxy_pass http://identity_service;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/profiles {
            proxy_pass http://identity_service;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/sessions {
            proxy_pass http://session_service;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/notifications {
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /health/identity {
            proxy_pass http://identity_service/health;
        }

        location /health/session {
            proxy_pass http://session_service/health;
        }

        location /health/notification {
            proxy_pass http://notification_service/health;
        }
    }
}